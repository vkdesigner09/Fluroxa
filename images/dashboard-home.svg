<svg
  xmlns="http://www.w3.org/2000/svg"
  width="20"
  height="20"
  viewBox="0 0 20 20"
  fill="none"
>

  <!-- top-left panel — large, main -->
  <rect
    x="2"
    y="2"
    width="7"
    height="8"
    rx="1.5"
    fill="#c7d2fe"
    stroke="#4080ff"
    stroke-width="1.2"
  />

  <!-- top-right panel — small -->
  <rect
    x="11"
    y="2"
    width="7"
    height="4"
    rx="1.5"
    fill="#4080ff"
    opacity="0.5"
    stroke="#4080ff"
    stroke-width="1.2"
  />

  <!-- bottom-left panel — small -->
  <rect
    x="2"
    y="12"
    width="7"
    height="6"
    rx="1.5"
    fill="#4080ff"
    opacity="0.3"
    stroke="#4080ff"
    stroke-width="1.2"
  />

  <!-- bottom-right panel — large, accent -->
  <rect
    x="11"
    y="8"
    width="7"
    height="10"
    rx="1.5"
    fill="#c7d2fe"
    stroke="#4080ff"
    stroke-width="1.2"
  />

  <!-- mini bar inside bottom-right — active indicator -->
  <rect
    x="13"
    y="13"
    width="3"
    height="1.2"
    rx="0.6"
    fill="#4080ff"
    opacity="0.6"
  />
  <rect
    x="13"
    y="15"
    width="2"
    height="1.2"
    rx="0.6"
    fill="#4080ff"
    opacity="0.3"
  />

</svg>